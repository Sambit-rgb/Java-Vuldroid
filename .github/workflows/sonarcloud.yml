name: Multi-Module Smart Sonar Scan

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  pull-requests: read

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Setup Java
      - name: Setup JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8

      # ✅ Install SonarScanner (FIXED)
      - name: Install SonarScanner
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip curl

          curl -sSLo scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip -q scanner.zip

          SCANNER_DIR=$(find . -type d -name "sonar-scanner-*" | head -n 1)

          echo "SCANNER_HOME=$SCANNER_DIR" >> $GITHUB_ENV
          echo "$SCANNER_DIR/bin" >> $GITHUB_PATH

      # ✅ Discover modules (SPACE SAFE)
      - name: Discover modules
        id: discover
        run: |
          echo "Scanning for modules..."

          MODULES=$(find . -type f \( -name "pom.xml" -o -name "build.gradle" -o -name "settings.gradle" \) \
            -not -path "*/node_modules/*" \
            -not -path "*/.git/*" \
            | sed 's|/[^/]*$||' \
            | sort -u)

          if [ -z "$MODULES" ]; then
            echo "No modules found, defaulting to root"
            MODULES="."
          fi

          echo "Detected modules:"
          echo "$MODULES"

          echo "modules<<EOF" >> $GITHUB_OUTPUT
          echo "$MODULES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ✅ Auto-create Sonar projects
      - name: Create Sonar projects
        run: |
          while IFS= read -r module; do
            NAME=$(basename "$module")
            SAFE_NAME=$(echo "$NAME" | tr ' /' '_')
            KEY="sambit-rgb_${GITHUB_REPOSITORY##*/}_$SAFE_NAME"

            echo "Creating project: $KEY"

            curl -u $SONAR_TOKEN: \
              -X POST "https://sonarcloud.io/api/projects/create" \
              -d "name=$NAME" \
              -d "project=$KEY" \
              -d "organization=sambit-rgb" || true

          done <<< "${{ steps.discover.outputs.modules }}"
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ✅ Build + Scan modules
      - name: Build and Scan modules
        run: |
          while IFS= read -r module; do

            echo "===================================="
            echo "Processing module: $module"
            echo "===================================="

            NAME=$(basename "$module")
            SAFE_NAME=$(echo "$NAME" | tr ' /' '_')
            KEY="sambit-rgb_${GITHUB_REPOSITORY##*/}_$SAFE_NAME"

            echo "Project Key: $KEY"

            pushd "$module" > /dev/null

            # 🔍 Detect build tool
            if [ -f "gradlew" ]; then
              BUILD="gradle-wrapper"
            elif [ -f "build.gradle" ]; then
              BUILD="gradle"
            elif [ -f "pom.xml" ]; then
              BUILD="maven"
            else
              BUILD="none"
            fi

            echo "Build tool: $BUILD"

            # 🔨 Try build (ignore failure)
            if [ "$BUILD" = "gradle-wrapper" ]; then
              chmod +x gradlew
              ./gradlew assembleDebug --no-daemon || echo "Build failed"

            elif [ "$BUILD" = "gradle" ]; then
              sudo apt-get update && sudo apt-get install -y gradle
              gradle build || echo "Build failed"

            elif [ "$BUILD" = "maven" ]; then
              mvn clean install -DskipTests || echo "Build failed"

            else
              echo "Skipping build"
            fi

            # 🔍 Detect binaries
            BIN=$(find . -type d \( -path "*/build/classes*" -o -path "*/target/classes*" \) | head -n 1)

            if [ -z "$BIN" ]; then
              echo "No binaries → fallback"
              BIN="."
            fi

            FULL_BIN="$module/$BIN"

            popd > /dev/null

            echo "Using binaries: $FULL_BIN"

            # 🚀 Sonar Scan (FIXED)
            $SCANNER_HOME/bin/sonar-scanner \
              -Dsonar.projectKey=Sambit-rgb_Java-Vuldroid \
              -Dsonar.organization=sambit-rgb \
              -Dsonar.sources="$module" \
              -Dsonar.java.binaries="$FULL_BIN" \
              -Dsonar.java.binaries.fallbackToEmpty=true \
              -Dsonar.host.url=https://sonarcloud.io \
              -Dsonar.login=${SONAR_TOKEN} \
              -Dsonar.verbose=true

          done <<< "${{ steps.discover.outputs.modules }}"
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
